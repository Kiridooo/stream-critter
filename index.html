<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Critter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a0a1a 100%);
    font-family: 'Inter', sans-serif;
    color: #e0e0ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
  }
  .header { text-align: center; }
  .title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #7B2FBE, #00D4FF, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { font-size: 11px; color: #888; letter-spacing: 3px; margin-top: 2px; }

  .spawn-zone {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    position: relative;
    min-height: 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .spawn-zone.active { border-color: var(--rarity-color); box-shadow: 0 0 30px var(--rarity-glow); }

  .rarity-label { font-size: 11px; letter-spacing: 3px; font-weight: 700; }
  .critter-emoji { font-size: 64px; line-height: 1; animation: bob 1s ease-in-out infinite; }
  .critter-name { font-size: 20px; font-weight: 800; }
  .critter-info { font-size: 12px; color: #aaa; }
  .progress-bar { width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 1s linear; }

  .catch-btn {
    padding: 12px 32px;
    border: none; border-radius: 10px;
    color: #fff; font-weight: 900; font-size: 15px;
    cursor: pointer; letter-spacing: 1px;
    transition: transform 0.1s;
    font-family: 'Rajdhani', sans-serif;
  }
  .catch-btn:active { transform: scale(0.95); }

  .idle { color: #555; }
  .idle-icon { font-size: 40px; margin-bottom: 8px; }
  .idle-text { font-size: 13px; }
  .idle-sub { font-size: 11px; margin-top: 4px; color: #444; }

  .catch-effect {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
    font-size: 60px;
    pointer-events: none;
    z-index: 10;
    animation: celebrate 0.5s ease-out forwards;
  }

  .tabs { display: flex; gap: 8px; width: 100%; max-width: 420px; }
  .tab-btn {
    flex: 1; padding: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #666;
    font-weight: 700; font-size: 11px;
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .tab-btn.active { background: rgba(123,47,190,0.4); border-color: #7B2FBE; color: #e0e0ff; }

  .panel {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
    min-height: 220px;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Chat */
  .chat-log {
    height: 260px; overflow-y: auto;
    padding: 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .chat-log::-webkit-scrollbar { width: 4px; }
  .chat-log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .chat-msg { font-size: 12px; line-height: 1.5; }
  .chat-user { font-weight: 700; margin-right: 6px; }
  .chat-user.system { color: #7B2FBE; }
  .chat-user.success { color: #95E1A3; }
  .chat-user.catch { color: #FFD700; }
  .chat-user.normal { color: #00D4FF; }
  .chat-text.system { color: #aaa; }
  .chat-text.normal { color: #ccc; }

  /* Collection */
  .collection-panel { padding: 16px; }
  .section-label { font-size: 11px; color: #666; margin-bottom: 12px; letter-spacing: 2px; }
  .empty-state { text-align: center; color: #444; padding: 30px 0; }
  .empty-icon { font-size: 30px; }
  .empty-text { font-size: 12px; margin-top: 8px; }
  .critter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .critter-card {
    text-align: center;
    background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 10px 4px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .critter-card-emoji { font-size: 28px; }
  .critter-card-name { font-size: 9px; color: #aaa; margin-top: 2px; }
  .critter-card-count { font-size: 10px; font-weight: 700; }

  /* Leaderboard */
  .lb-panel { padding: 16px; }
  .lb-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; margin-bottom: 4px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid transparent;
  }
  .lb-row.me { background: rgba(123,47,190,0.2); border-color: rgba(123,47,190,0.3); }
  .lb-rank { width: 20px; font-weight: 900; font-size: 12px; }
  .lb-name { flex: 1; font-size: 13px; color: #aaa; }
  .lb-name.me { color: #e0e0ff; font-weight: 700; }
  .lb-pts { font-size: 12px; color: #FFD700; font-weight: 700; }

  .footer { font-size: 10px; color: #333; letter-spacing: 2px; text-align: center; }

  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes celebrate { 0% { opacity: 1; transform: scale(1); background: rgba(255,215,0,0.1); } 100% { opacity: 0; transform: scale(1.05); } }
</style>
</head>
<body>

<div class="header">
  <div class="title">✦ STREAM CRITTER ✦</div>
  <div class="subtitle">TWITCH COLLECTOR GAME</div>
</div>

<div class="spawn-zone" id="spawnZone">
  <div class="idle" id="idleState">
    <div class="idle-icon">🌿</div>
    <div class="idle-text">Nächster Spawn in <span id="spawnCountdown" style="color:#7B2FBE;font-weight:700">...</span>s</div>
    <div class="idle-sub">Im Chat: !catch wenn ein Critter erscheint</div>
  </div>
  <div id="activeState" style="display:none; flex-direction:column; align-items:center; gap:10px;">
    <div class="rarity-label" id="rarityLabel"></div>
    <div class="critter-emoji" id="critterEmoji"></div>
    <div class="critter-name" id="critterName"></div>
    <div class="critter-info" id="critterInfo"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="catch-btn" id="catchBtn" onclick="handleCatch()">!catch — FANGEN!</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('live', this)">💬 Chat</button>
  <button class="tab-btn" onclick="switchTab('sammlung', this)">📦 Sammlung</button>
  <button class="tab-btn" onclick="switchTab('rangliste', this)">🏆 Top</button>
</div>

<div class="panel">
  <div id="tab-live" class="tab-content active">
    <div class="chat-log" id="chatLog"></div>
  </div>
  <div id="tab-sammlung" class="tab-content">
    <div class="collection-panel">
      <div class="section-label" id="collLabel">DEINE SAMMLUNG (0/9)</div>
      <div id="collEmpty" class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Noch keine Critter gefangen!</div></div>
      <div id="collGrid" class="critter-grid" style="display:none"></div>
    </div>
  </div>
  <div id="tab-rangliste" class="tab-content">
    <div class="lb-panel">
      <div class="section-label">TOP CATCHER</div>
      <div id="lbList"></div>
    </div>
  </div>
</div>

<div class="footer">CHAT-BEFEHL: !catch • SELTENHEIT: COMMON › RARE › EPIC › LEGENDARY</div>

<script>
const CRITTERS = [
  { id:"foxling",     name:"Foxling",     emoji:"🦊", rarity:"common",    color:"#FF6B35", points:10  },
  { id:"moonbun",     name:"Moonbun",     emoji:"🐰", rarity:"common",    color:"#A8D8EA", points:10  },
  { id:"glowfrog",    name:"Glowfrog",    emoji:"🐸", rarity:"common",    color:"#95E1A3", points:15  },
  { id:"stardust",    name:"Stardust",    emoji:"✨", rarity:"rare",      color:"#FFD700", points:50  },
  { id:"crystalwolf", name:"Crystalwolf", emoji:"🐺", rarity:"rare",      color:"#B8A9FF", points:60  },
  { id:"shadowcat",   name:"Shadowcat",   emoji:"🐈‍⬛", rarity:"rare",    color:"#6C63FF", points:70  },
  { id:"phoenixbird", name:"Phoenix",     emoji:"🔥", rarity:"legendary", color:"#FF4444", points:200 },
  { id:"moondragon",  name:"Moondragon",  emoji:"🐉", rarity:"legendary", color:"#7B2FBE", points:300 },
  { id:"cosmicjelly", name:"Cosmicjelly", emoji:"🪼", rarity:"epic",      color:"#00D4FF", points:120 },
];
const RARITY_WEIGHTS = { common:60, rare:25, epic:10, legendary:5 };
const RARITY_COLORS  = { common:"#95E1A3", rare:"#6C63FF", epic:"#00D4FF", legendary:"#FFD700" };
const FAKE_VIEWERS   = ["StreamerPal42","NightOwl_TV","xX_Gamer_Xx","CuriousCat99","PixelQueen","LootGoblin","Vexx_Dev","StarChaser"];
const YOUR_NAME = "YOU";

let activeCritter = null;
let catchOpen = false;
let countdown = 0;
let collection = {};
let leaderboard = {};
let countdownInterval = null;
let spawnTimeout = null;
let spawnCountdown = 0;
let spawnCountInterval = null;

function randCritter() {
  const roll = Math.random() * 100;
  let cum = 0, tier = "common";
  for (const [r, w] of Object.entries(RARITY_WEIGHTS)) { cum += w; if (roll < cum) { tier = r; break; } }
  const pool = CRITTERS.filter(c => c.rarity === tier);
  return pool[Math.floor(Math.random() * pool.length)];
}

function addChat(user, msg, type="normal") {
  const log = document.getElementById("chatLog");
  const div = document.createElement("div");
  div.className = "chat-msg";
  div.innerHTML = `<span class="chat-user ${type}">${user}</span><span class="chat-text ${type === 'success' ? 'normal' : type}">${msg}</span>`;
  log.appendChild(div);
  while (log.children.length > 35) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function showSpawnZone(critter) {
  const zone = document.getElementById("spawnZone");
  zone.style.setProperty("--rarity-color", RARITY_COLORS[critter.rarity]);
  zone.style.setProperty("--rarity-glow", RARITY_COLORS[critter.rarity] + "44");
  zone.classList.add("active");
  document.getElementById("idleState").style.display = "none";
  const as = document.getElementById("activeState");
  as.style.display = "flex";
  document.getElementById("rarityLabel").textContent = critter.rarity.toUpperCase() + " CRITTER APPEARED!";
  document.getElementById("rarityLabel").style.color = RARITY_COLORS[critter.rarity];
  document.getElementById("critterEmoji").textContent = critter.emoji;
  document.getElementById("critterEmoji").style.filter = `drop-shadow(0 0 20px ${critter.color})`;
  document.getElementById("critterName").textContent = critter.name;
  document.getElementById("critterName").style.color = critter.color;
  const btn = document.getElementById("catchBtn");
  btn.style.background = `linear-gradient(135deg, ${critter.color}, ${RARITY_COLORS[critter.rarity]})`;
  btn.style.boxShadow = `0 4px 20px ${critter.color}66`;
  updateProgress(15, 15);
}

function hideSpawnZone() {
  document.getElementById("spawnZone").classList.remove("active");
  document.getElementById("spawnZone").style.cssText = "";
  document.getElementById("idleState").style.display = "block";
  document.getElementById("activeState").style.display = "none";
}

function updateProgress(cur, max) {
  document.getElementById("progressFill").style.width = `${(cur/max)*100}%`;
  document.getElementById("progressFill").style.background = activeCritter ? RARITY_COLORS[activeCritter.rarity] : "#fff";
  document.getElementById("critterInfo").textContent = `+${activeCritter.points} Punkte • ${cur}s verbleibend`;
}

function spawnCritter() {
  clearInterval(spawnCountInterval);
  activeCritter = randCritter();
  catchOpen = true;
  countdown = 15;
  showSpawnZone(activeCritter);
  addChat("🎮 System", `A wild ${activeCritter.emoji} ${activeCritter.name} appeared! [${activeCritter.rarity.toUpperCase()}] Type !catch to grab it!`, "system");

  countdownInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(countdownInterval);
      const name = activeCritter.name;
      catchOpen = false; activeCritter = null;
      hideSpawnZone();
      addChat("🎮 System", `The ${name} ran away... 😢`, "system");
      scheduleNext();
      return;
    }
    updateProgress(countdown, 15);
    // fake catch at ~10s
    if (countdown === 10 && Math.random() > 0.4) {
      const faker = FAKE_VIEWERS[Math.floor(Math.random() * FAKE_VIEWERS.length)];
      addChat(faker, "!catch", "catch");
      leaderboard[faker] = (leaderboard[faker] || 0) + activeCritter.points;
      renderLeaderboard();
    }
  }, 1000);
}

function scheduleNext() {
  const delay = Math.round(8 + Math.random() * 12);
  spawnCountdown = delay;
  document.getElementById("spawnCountdown").textContent = spawnCountdown;
  spawnCountInterval = setInterval(() => {
    spawnCountdown--;
    document.getElementById("spawnCountdown").textContent = Math.max(0, spawnCountdown);
    if (spawnCountdown <= 0) clearInterval(spawnCountInterval);
  }, 1000);
  spawnTimeout = setTimeout(spawnCritter, delay * 1000);
}

function handleCatch() {
  if (!catchOpen || !activeCritter) return;
  clearInterval(countdownInterval);
  const critter = activeCritter;
  catchOpen = false; activeCritter = null;
  hideSpawnZone();

  collection[critter.id] = (collection[critter.id] || 0) + 1;
  leaderboard[YOUR_NAME] = (leaderboard[YOUR_NAME] || 0) + critter.points;

  // Effect
  const zone = document.getElementById("spawnZone");
  const fx = document.createElement("div");
  fx.className = "catch-effect";
  fx.textContent = "🎉";
  fx.style.background = RARITY_COLORS[critter.rarity] + "22";
  zone.appendChild(fx);
  setTimeout(() => zone.removeChild(fx), 600);

  addChat(YOUR_NAME, "!catch", "catch");
  addChat("🎮 System", `✅ ${YOUR_NAME} caught the ${critter.emoji} ${critter.name}! +${critter.points} pts`, "success");

  renderCollection();
  renderLeaderboard();
  scheduleNext();
}

function renderCollection() {
  const owned = CRITTERS.filter(c => collection[c.id]);
  document.getElementById("collLabel").textContent = `DEINE SAMMLUNG (${owned.length}/${CRITTERS.length})`;
  if (owned.length === 0) {
    document.getElementById("collEmpty").style.display = "block";
    document.getElementById("collGrid").style.display = "none";
    return;
  }
  document.getElementById("collEmpty").style.display = "none";
  const grid = document.getElementById("collGrid");
  grid.style.display = "grid";
  grid.innerHTML = owned.map(c => `
    <div class="critter-card" style="border-color:${RARITY_COLORS[c.rarity]}44">
      <div class="critter-card-emoji">${c.emoji}</div>
      <div class="critter-card-name">${c.name}</div>
      <div class="critter-card-count" style="color:${RARITY_COLORS[c.rarity]}">×${collection[c.id]}</div>
    </div>`).join("");
}

function renderLeaderboard() {
  const sorted = Object.entries(leaderboard).sort((a,b) => b[1]-a[1]).slice(0,8);
  const rankColors = ["#FFD700","#C0C0C0","#CD7F32"];
  document.getElementById("lbList").innerHTML = sorted.length === 0
    ? `<div style="text-align:center;color:#444;padding:30px 0;font-size:12px">Noch keine Punkte!</div>`
    : sorted.map(([name, pts], i) => `
      <div class="lb-row ${name===YOUR_NAME?'me':''}">
        <div class="lb-rank" style="color:${rankColors[i]||'#555'}">#${i+1}</div>
        <div class="lb-name ${name===YOUR_NAME?'me':''}">${name}</div>
        <div class="lb-pts">${pts} pts</div>
      </div>`).join("");
}

function switchTab(name, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}

// Init
addChat("🎮 System", "Stream Critter is LIVE! Watch for wild critters to appear!", "system");
renderCollection();
renderLeaderboard();
setTimeout(spawnCritter, 3000);
</script>
</body>
</html>
